<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eXemble Login</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { SVGLoader } from 'three/addons/loaders/SVGLoader.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

try {

var W = innerWidth, H = innerHeight;
var scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

var camera = new THREE.PerspectiveCamera(40, W / H, 0.1, 500);
camera.position.set(0, 0, 20);

var renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

var composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(W, H), 0.5, 0.4, 0.82));
composer.addPass(new OutputPass());

// Env map
var envW = 1024, envH = 512;
var envData = new Float32Array(envW * envH * 4);
for (var iy = 0; iy < envH; iy++) {
  var v = iy / envH;
  for (var ix = 0; ix < envW; ix++) {
    var u = ix / envW, idx = (iy * envW + ix) * 4;
    var val = 0.002;
    val += Math.exp(-Math.pow((v-0.1)/0.06,2))*3.5;
    val += Math.exp(-Math.pow((v-0.3)/0.08,2))*0.5;
    val += Math.exp(-Math.pow((v-0.5)/0.15,2))*0.1;
    val += Math.exp(-Math.pow((v-0.88)/0.05,2))*2.0;
    val += Math.exp(-Math.pow((u-0.15)/0.04,2))*Math.exp(-Math.pow((v-0.5)/0.3,2))*0.8;
    val += Math.exp(-Math.pow((u-0.85)/0.04,2))*Math.exp(-Math.pow((v-0.5)/0.3,2))*0.7;
    envData[idx]=val; envData[idx+1]=val; envData[idx+2]=val; envData[idx+3]=1;
  }
}
var envTex = new THREE.DataTexture(envData, envW, envH, THREE.RGBAFormat, THREE.FloatType);
envTex.mapping = THREE.EquirectangularReflectionMapping; envTex.needsUpdate = true;
var pmrem = new THREE.PMREMGenerator(renderer);
pmrem.compileEquirectangularShader();
var envMap = pmrem.fromEquirectangular(envTex).texture;
envTex.dispose(); pmrem.dispose();
scene.environment = envMap;

// === SVG → Geometry ===
var svgStr = '<svg width="128" height="102" viewBox="0 0 128 102" fill="none" xmlns="http://www.w3.org/2000/svg"><g clip-path="url(#clip0_2283_54)"><path d="M128.002 41.6823H99.1511C86.4882 41.6823 73.6846 54.0114 73.6846 65.9182V96H54.8571V65.9036C54.8571 63.8825 55.7038 61.952 57.1968 60.5362L93.3966 26.2041C95.0642 24.6227 97.317 23.7409 99.6571 23.7409H128.002V41.6823Z" fill="#222222"/><path d="M73.1447 32.0137C73.1447 34.2711 72.1989 36.427 70.5303 38.0101L34.6053 72.0818C32.9376 73.6631 30.6848 74.5449 28.3447 74.5449H0V56.6034H28.8509C41.5136 56.6034 54.3173 44.2743 54.3173 32.3671V2.28572H73.1447V32.0137Z" fill="#222222"/></g></svg>';

var svgData = new SVGLoader().parse(svgStr);
var baseGeos = [];
svgData.paths.forEach(function(path) {
  SVGLoader.createShapes(path).forEach(function(shape) {
    var geo = new THREE.ExtrudeGeometry(shape, {
      depth: 1.5, bevelEnabled: true,
      bevelThickness: 0.5, bevelSize: 0.5,
      bevelSegments: 16, curveSegments: 48,
    });
    geo.computeVertexNormals();
    baseGeos.push(geo);
  });
});

// Center
var allMin = new THREE.Vector3(Infinity,Infinity,Infinity);
var allMax = new THREE.Vector3(-Infinity,-Infinity,-Infinity);
baseGeos.forEach(function(g) { g.computeBoundingBox(); allMin.min(g.boundingBox.min); allMax.max(g.boundingBox.max); });
var cx=(allMin.x+allMax.x)/2, cy=(allMin.y+allMax.y)/2, cz=(allMin.z+allMax.z)/2;
var sf = 7 / Math.max(allMax.x-allMin.x, allMax.y-allMin.y, allMax.z-allMin.z);
baseGeos.forEach(function(g) { g.translate(-cx,-cy,-cz); });

// === CREATE STACKED LAYERS ===
var LAYERS = 18;
var LAYER_SPACING = 0.35;
var layers = []; // { group, z, material }

for (var li = 0; li < LAYERS; li++) {
  var t = li / (LAYERS - 1); // 0 = front, 1 = back
  var zPos = (li - (LAYERS - 1) / 2) * LAYER_SPACING;

  // Front layers: solid chrome. Back layers: progressively ghostly
  var isFront = li === Math.floor((LAYERS - 1) / 2);

  var mat;
  if (isFront) {
    // Hero layer: solid chrome
    mat = new THREE.MeshPhysicalMaterial({
      color: 0x080810, metalness: 1.0, roughness: 0.1,
      envMap: envMap, envMapIntensity: 2.5,
      clearcoat: 0.8, clearcoatRoughness: 0.05,
      reflectivity: 1.0, side: THREE.DoubleSide,
    });
  } else {
    // Ghost layers: translucent with edge glow
    var distFromCenter = Math.abs(li - (LAYERS - 1) / 2) / ((LAYERS - 1) / 2);
    var opacity = Math.max(0.03, 0.25 * (1 - distFromCenter * 0.8));

    mat = new THREE.MeshPhysicalMaterial({
      color: new THREE.Color().setHSL(0, 0, 0.15 + (1 - distFromCenter) * 0.1),
      metalness: 0.9,
      roughness: 0.2 + distFromCenter * 0.3,
      envMap: envMap,
      envMapIntensity: 1.5 * (1 - distFromCenter * 0.5),
      clearcoat: 0.5,
      clearcoatRoughness: 0.1,
      transparent: true,
      opacity: opacity,
      side: THREE.DoubleSide,
      depthWrite: false,
    });
  }

  var group = new THREE.Group();
  baseGeos.forEach(function(g) {
    group.add(new THREE.Mesh(g, mat));
  });
  group.scale.set(sf, -sf, sf);
  group.position.z = zPos;

  scene.add(group);
  layers.push({
    group: group,
    baseZ: zPos,
    mat: mat,
    index: li,
    distFromCenter: Math.abs(li - (LAYERS - 1) / 2) / ((LAYERS - 1) / 2),
    isFront: isFront,
  });
}

// === MOUSE & DRAG ===
var mouseX = 0, mouseY = 0;
var targetMouseX = 0, targetMouseY = 0;

// Drag state
var isDragging = false;
var dragStartX = 0, dragStartY = 0;
var dragDeltaX = 0, dragDeltaY = 0; // current drag offset
var springX = 0, springY = 0; // spring-animated value
var springVelX = 0, springVelY = 0;
var SPRING_STIFFNESS = 12;
var SPRING_DAMPING = 0.75;

window.addEventListener('mousemove', function(e) {
  targetMouseX = (e.clientX / W - 0.5) * 2;
  targetMouseY = (e.clientY / H - 0.5) * 2;
  if (isDragging) {
    dragDeltaX = (e.clientX - dragStartX) / W * 8;
    dragDeltaY = (e.clientY - dragStartY) / H * 8;
  }
});

window.addEventListener('mousedown', function(e) {
  isDragging = true;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  dragDeltaX = 0;
  dragDeltaY = 0;
  document.body.style.cursor = 'grabbing';
});

window.addEventListener('mouseup', function() {
  isDragging = false;
  // dragDelta snaps to 0, spring takes over with velocity
  springVelX += dragDeltaX * 3;
  springVelY += dragDeltaY * 3;
  dragDeltaX = 0;
  dragDeltaY = 0;
  document.body.style.cursor = 'grab';
});

document.body.style.cursor = 'grab';

// === LIGHTING ===
scene.add(new THREE.AmbientLight(0x050505, 0.15));
var dl1 = new THREE.DirectionalLight(0x888899, 0.4);
dl1.position.set(-3, 4, 8); scene.add(dl1);
var dl2 = new THREE.DirectionalLight(0x556677, 0.2);
dl2.position.set(3, -2, 6); scene.add(dl2);

// === ANIMATION ===
var prevTime = 0;

function animate(time) {
  requestAnimationFrame(animate);
  var t = time * 0.001;
  var dt = Math.min((time - prevTime) / 1000, 0.05);
  prevTime = time;

  // Smooth mouse
  mouseX += (targetMouseX - mouseX) * 4 * dt;
  mouseY += (targetMouseY - mouseY) * 4 * dt;

  // === SPRING PHYSICS ===
  // When dragging: springX/Y follows drag directly
  // When released: spring back to 0 with bounce
  if (isDragging) {
    springX = dragDeltaX;
    springY = dragDeltaY;
    springVelX = 0;
    springVelY = 0;
  } else {
    // Spring force toward 0
    var forceX = -SPRING_STIFFNESS * springX;
    var forceY = -SPRING_STIFFNESS * springY;
    springVelX = (springVelX + forceX * dt) * SPRING_DAMPING;
    springVelY = (springVelY + forceY * dt) * SPRING_DAMPING;
    springX += springVelX * dt * 60;
    springY += springVelY * dt * 60;
    // Snap to 0 when close
    if (Math.abs(springX) < 0.001 && Math.abs(springVelX) < 0.001) { springX = 0; springVelX = 0; }
    if (Math.abs(springY) < 0.001 && Math.abs(springVelY) < 0.001) { springY = 0; springVelY = 0; }
  }

  var springMag = Math.sqrt(springX * springX + springY * springY);

  // Update each layer
  for (var i = 0; i < layers.length; i++) {
    var layer = layers[i];
    var g = layer.group;
    var dfc = layer.distFromCenter;
    var idx = layer.index;
    var centerIdx = (LAYERS - 1) / 2;
    var signedDist = (idx - centerIdx) / centerIdx; // -1 to 1

    // === DRAG is the ONLY thing that fans out layers ===
    // No parallax, no hover spread — at rest, all layers stack perfectly flat = looks like 1 symbol

    // Drag: layers fan out in drag direction
    var dragOffsetX = springX * signedDist * 1.5;
    var dragOffsetY = -springY * signedDist * 1.5;

    // Drag Z-spread: layers also separate along Z
    var dragZSpread = springMag * Math.abs(signedDist) * 1.2;

    // Subtle breathing only during drag/spring
    var breathe = springMag > 0.01 ? Math.sin(t * 0.8 + idx * 0.15) * 0.05 * springMag : 0;

    g.position.x = dragOffsetX;
    g.position.y = dragOffsetY;
    g.position.z = layer.baseZ * (springMag > 0.01 ? 1 : 0) + dragZSpread * Math.sign(signedDist) + breathe;

    // Rotation only from drag
    g.rotation.y = springX * 0.08 * signedDist;
    g.rotation.x = springY * 0.06 * signedDist;

    // Ghost layers: only visible when spread
    if (!layer.isFront && layer.mat.transparent) {
      var dragBoost = springMag * 0.2 * (1 - dfc * 0.4);
      layer.mat.opacity = Math.min(0.6, dragBoost);
    }
  }

  composer.render();
}
animate(0);

window.addEventListener('resize', function() {
  W = innerWidth; H = innerHeight;
  camera.aspect = W / H;
  camera.updateProjectionMatrix();
  renderer.setSize(W, H);
  composer.setSize(W, H);
});

} catch(err) {
  document.body.innerHTML = '<pre style="color:red;padding:20px;">'+err.message+'\n'+err.stack+'</pre>';
}
</script>
</body>
</html>
